# Genera/aggiorna le tracce audio del corso con ElevenLabs e le committa.
# In caso di errore apre una Issue con il log del passo fallito.
name: Genera audio (ElevenLabs)

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Rigenera anche le tracce esistenti"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "data/hy/lessons/**"
      - "data/hy/alphabet.json"
      - "data/hy/course.json"
      - "tools/gen_audio_elevenlabs.py"
      - ".github/workflows/audio.yml"

permissions:
  contents: write
  issues: write

concurrency:
  group: audio
  cancel-in-progress: false

jobs:
  audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Genera tracce
        id: gen
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID }}
          FORCE: ${{ inputs.force && '1' || '' }}
        run: |
          set -o pipefail
          python tools/gen_audio_elevenlabs.py 2>&1 | tee /tmp/gen.log

      - name: Committa se ci sono novità
        run: |
          git config user.name "ab1j-audio-bot"
          git config user.email "ab1j-audio-bot@users.noreply.github.com"
          git add data/hy/audio
          git diff --cached --quiet && echo "Nessuna modifica" && exit 0
          git commit -m "Audio: tracce rigenerate con ElevenLabs"
          git push

      - name: Apri una Issue in caso di errore
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAIL=$(tail -c 2000 /tmp/gen.log 2>/dev/null || echo "nessun log disponibile")
          gh issue create \
            --title "Audio: generazione fallita (run ${{ github.run_id }})" \
            --body "$(printf 'Ultime righe del log:\n\n```\n%s\n```' "$TAIL")"
